services:
    plant-sync-web.app:
        build:
            context: .
            dockerfile: Dockerfile
        image: ${DOCKER_REGISTRY-}plant-sync-web-app
        container_name: plant-sync-web.app
        restart: unless-stopped
        tty: true
        working_dir: /var/www/html
        environment:
            APP_ENV: local
            APP_DEBUG: "true"
            APP_URL: http://localhost:8000
            DB_CONNECTION: pgsql
            DB_HOST: plant-sync-web.database
            DB_PORT: 5432
            DB_DATABASE: plant_sync_web
            DB_USERNAME: plant_sync_web
            DB_PASSWORD: secret
        volumes:
            - ./:/var/www/html
            - ./storage:/var/www/html/storage
        depends_on:
            - plant-sync-web.database
        networks:
            - plant-sync-web-network

    plant-sync-web.webserver:
        image: nginx
        container_name: plant-sync-web.webserver
        restart: unless-stopped
        tty: true
        ports:
            - "8000:8004"
        volumes:
            - ./:/var/www/html
            - ./nginx/plant-sync-web.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - plant-sync-web.app
        networks:
            - plant-sync-web-network

    plant-sync-web.database:
        image: postgres:17
        container_name: plant-sync-web.database
        restart: unless-stopped
        tty: true
        environment:
            POSTGRES_DB: plant_sync_web
            POSTGRES_USER: plant_sync_web
            POSTGRES_PASSWORD: secret
        volumes:
            - dbdata:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        networks:
            - plant-sync-web-network

networks:
    plant-sync-web-network:
        driver: bridge

volumes:
    dbdata:
