services:
    smart-sprout.app:
        build:
            context: .
            dockerfile: Dockerfile
        image: ${DOCKER_REGISTRY-}smart-sprout-web-app
        container_name: SmartSprout.App
        restart: unless-stopped
        tty: true
        working_dir: /var/www/html
        environment:
            APP_ENV: local
            APP_DEBUG: "true"
            APP_URL: http://localhost:8000
            DB_CONNECTION: pgsql
            DB_HOST: smart-sprout.database
            DB_PORT: 5432
            DB_DATABASE: smart_sprout_web
            DB_USERNAME: smart_sprout
            DB_PASSWORD: secret
        volumes:
            - ./:/var/www/html
            - ./storage:/var/www/html/storage
        depends_on:
            - smart-sprout.database
        networks:
            - smart-sprout-network

    smart-sprout.webserver:
        image: nginx
        container_name: SmartSprout.WebServer
        restart: unless-stopped
        tty: true
        ports:
            - "8000:8004"
        volumes:
            - ./:/var/www/html
            - ./nginx/smart-sprout.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - smart-sprout.app
        networks:
            - smart-sprout-network

    smart-sprout.database:
        image: postgres:17
        container_name: SmartSprout.Database
        restart: unless-stopped
        tty: true
        environment:
            POSTGRES_DB: smart_sprout_web
            POSTGRES_USER: smart_sprout
            POSTGRES_PASSWORD: secret
        volumes:
            - dbdata:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        networks:
            - smart-sprout-network

networks:
    smart-sprout-network:
        driver: bridge

volumes:
    dbdata:
